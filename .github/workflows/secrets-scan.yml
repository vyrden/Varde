name: Secrets scan

on:
  pull_request:
  push:
    branches: [main, dev]

# Principe de moindre privilège : gitleaks se contente de lire le
# repo pour chercher des secrets. `contents: read` suffit — le
# GITHUB_TOKEN exposé à l'action n'a donc pas besoin de write sur
# issues, pull-requests, packages, etc.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
