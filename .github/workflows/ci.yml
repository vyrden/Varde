name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principe de moindre privilège : la CI ne fait que du read-only sur
# le repo (checkout + install + tests). Pas d'écriture de commit,
# pas de PR, pas de release. `contents: read` suffit.
permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit supply chain (jalon 5 PR 5.5). Bloque la CI si une
      # dépendance directe ou transitive a une vulnérabilité connue
      # de niveau HIGH ou CRITICAL. Les MODERATE et LOW remontent
      # mais ne fail pas — laissés à la décision du mainteneur via
      # `pnpm audit` local. Les overrides du root `package.json`
      # forcent les versions patchées sur les transitives qu'on ne
      # contrôle pas directement (next>postcss, testcontainers>uuid).
      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Couverture avec seuils anti-régression (jalon 5 PR 5.7).
      # Aujourd'hui appliqué sur `@varde/api` et `@varde/core` (les
      # deux packages dans le critère de sortie >75 %). `vitest run
      # --coverage` fail dès qu'un package configuré passe sous son
      # plancher défini dans `vitest.config.ts#coverageThresholds`.
      - name: Coverage
        run: pnpm coverage

      - name: Build
        run: pnpm build

      # Anti-régression bundle (jalon 5 PR 5.8). Vérifie que les chunks
      # client du dashboard restent sous les plafonds convenus.
      # Mesure courante au commit : ~1170 KB uncompressed, ~355 KB
      # gzipped. Plafonds avec slack ~30 % au-dessus, à relever
      # explicitement (avec note dans SECURITY.md) si une PR fait
      # gonfler le bundle pour une raison légitime.
      - name: Bundle size check
        env:
          MAX_UNCOMPRESSED_KB: 1700
          MAX_GZIPPED_KB: 500
          CHUNKS_DIR: apps/dashboard/.next/static/chunks
        run: |
          if [[ ! -d "$CHUNKS_DIR" ]]; then
            echo "❌ $CHUNKS_DIR introuvable — le step Build doit avoir échoué" >&2
            exit 1
          fi
          total_uncompressed=$(find "$CHUNKS_DIR" -name "*.js" -type f -exec du -b {} + 2>/dev/null \
            | awk '{s+=$1} END {print s+0}')
          total_uncompressed_kb=$(( total_uncompressed / 1024 ))
          total_gzipped=0
          while IFS= read -r f; do
            size=$(gzip -c "$f" | wc -c)
            total_gzipped=$(( total_gzipped + size ))
          done < <(find "$CHUNKS_DIR" -name "*.js" -type f)
          total_gzipped_kb=$(( total_gzipped / 1024 ))
          echo "Bundle dashboard — chunks client"
          echo "  Total uncompressed : ${total_uncompressed_kb} KB / plafond ${MAX_UNCOMPRESSED_KB} KB"
          echo "  Total gzipped      : ${total_gzipped_kb} KB / plafond ${MAX_GZIPPED_KB} KB"
          failed=0
          if (( total_uncompressed_kb > MAX_UNCOMPRESSED_KB )); then
            echo "❌ Plafond uncompressed dépassé" >&2
            failed=1
          fi
          if (( total_gzipped_kb > MAX_GZIPPED_KB )); then
            echo "❌ Plafond gzipped dépassé" >&2
            failed=1
          fi
          if (( failed == 1 )); then
            echo "" >&2
            echo "Si l'inflation est légitime, ajuste MAX_UNCOMPRESSED_KB" >&2
            echo "et MAX_GZIPPED_KB dans .github/workflows/ci.yml et" >&2
            echo "documente la nouvelle baseline dans SECURITY.md." >&2
            exit 1
          fi
          echo "✓ Bundle sous les plafonds."
